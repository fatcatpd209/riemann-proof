name: RiemannProof CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rocq 9 via opam (matches local 9.0.1, supports 'From Stdlib ...' syntax)
        run: |
          sudo apt-get update
          sudo apt-get install -y opam
          opam init --disable-sandboxing -a git://github.com/ocaml/opam-repository.git 2>&1 | tail -5 || true
          eval "$(opam env)"
          opam update
          opam install -y ocaml-base-compiler ocamlfind
          opam install -y rocq rocq-reals rocq-coquelicot 2>&1 | tail -30
          eval "$(opam env)"
          coqc --version

      - name: Layer 1  DAG static analysis
        run: python3 dag_verify.py

      - name: Layer 2  Axiom classification
        run: python3 coq_axiom_check.py

      - name: Layer 3  Coq compile (root modules)
        run: |
          set -e
          coqc -q -I . riemann_coq.v
          coqc -q -I . logic_tools.v
          coqc -q -I . base_library.v
          coqc -q -I . main_proof.v
          coqc -q -I . phase2_layered.v
          coqc -q -I . extension_lehmer.v
          coqc -q -I . riemann_hypothesis_formal.v
          coqc -q -I . riemann_coq_analysis.v

      - name: Upload compile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coq-compile-results
          path: "*.vo"
          if-no-files-found: warn
