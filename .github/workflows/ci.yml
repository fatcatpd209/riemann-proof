name: RiemannProof CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Coq 8.18 (apt, universe repo)
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe > /dev/null 2>&1 || true
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends coq
          coqc --version
          which coqc
          ls -la /usr/bin/coqc || true

      - name: Layer 1  DAG static analysis
        run: python3 dag_verify.py

      - name: Layer 2  Axiom classification
        run: python3 coq_axiom_check.py

      - name: Layer 3  Coq compile (root modules)
        run: |
          set -e
          coqc -q -I . riemann_coq.v
          coqc -q -I . logic_tools.v
          coqc -q -I . base_library.v
          coqc -q -I . main_proof.v
          coqc -q -I . phase2_layered.v
          coqc -q -I . extension_lehmer.v
          coqc -q -I . riemann_hypothesis_formal.v
          coqc -q -I . riemann_coq_analysis.v

      - name: Upload compile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coq-compile-results
          path: "*.vo"
          if-no-files-found: warn
