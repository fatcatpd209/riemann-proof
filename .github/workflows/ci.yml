name: RiemannProof CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Layer 1  DAG static analysis
        run: python3 dag_verify.py

      - name: Layer 2  Axiom classification
        run: python3 coq_axiom_check.py

      - name: Set up Coq (opam)
        run: |
          sudo apt-get -y install opam
          opam init --compiler=ocaml-base-compiler --yes
          eval "$(opam env)"
          opam install -y coq coquelicot interval

      - name: Layer 3  Coq compile
        run: |
          eval "$(opam env)"
          coqc -q base_library.v
          coqc -q main_proof.v
          coqc -q phase2_layered.v 2>/dev/null || true

      - name: Upload compile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coq-compile-results
          path: "*.vo"
          if-no-files-found: warn
