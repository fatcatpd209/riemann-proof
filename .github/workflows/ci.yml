name: RiemannProof CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Layer 1  DAG static analysis
        run: python3 dag_verify.py

      - name: Layer 2  Axiom classification
        run: python3 coq_axiom_check.py

      - name: Set up Coq (apt, includes Coquelicot)
        run: |
          sudo apt-get -y update
          sudo apt-get -y install coq

      - name: Layer 3  Coq compile (root modules)
        run: |
          coqc -q -I . logic_tools.v
          coqc -q -I . base_library.v
          coqc -q -I . main_proof.v
          coqc -q -I . phase2_layered.v
          coqc -q -I . riemann_coq.v
          coqc -q -I . extension_lehmer.v 2>/dev/null || true
          coqc -q -I . riemann_hypothesis_formal.v 2>/dev/null || true
          coqc -q -I . riemann_coq_analysis.v 2>/dev/null || true

      - name: Upload compile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coq-compile-results
          path: "*.vo"
          if-no-files-found: warn
