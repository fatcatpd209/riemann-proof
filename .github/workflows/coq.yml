name: riemann-coq-check

on: [push, pull_request, workflow_dispatch]

jobs:
  coq-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4.2

      - name: Install Coq via apt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y coq | tail -5
          coqc --version

      - name: Build
        working-directory: "投稿论文"
        run: |
          {
            echo "==== ls ===="
            ls -la
            echo "==== coqc version ===="
            coqc --version
            echo "==== coqc riemann_thesis_coq.v ===="
            coqc -v riemann_thesis_coq.v
            echo "EXIT_COQC=$?"
          } 2>&1 | tee -a coq_build.log
          echo "==== END ====" >> coq_build.log
          cat coq_build.log | tail -100

      - uses: actions/upload-artifact@v4.4
        if: always()
        with:
          name: coq-build-log
          path: 投稿论文/coq_build.log
          if-no-files-found: warn
