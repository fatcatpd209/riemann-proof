name: riemann-coq-check

on: [push, pull_request, workflow_dispatch]

jobs:
  coq-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: coq-community/setup-coq@master
        with:
          version: '8.18'
          opam-packages: 'coq'

      - name: Build
        run: |
          cd "投稿论文" || exit 1
          echo "=== ls ===" >> coq_build.log
          ls -la >> coq_build.log 2>&1
          echo "" >> coq_build.log

          echo "=== coqc version ===" >> coq_build.log
          coqc --version >> coq_build.log 2>&1 || true
          echo "" >> coq_build.log

          echo "=== coqc riemann_thesis_coq.v (exit first pass) ===" >> coq_build.log
          coqc -v riemann_thesis_coq.v >> coq_build.log 2>&1 ; echo "EXIT_CODE=$?" >> coq_build.log
          echo "" >> coq_build.log

          echo "=== coqtop verbose ===" >> coq_build.log
          coqtop -q -batch -load-vernac-source riemann_thesis_coq.v -require=riemann_thesis_coq >> coq_build.log 2>&1 ; echo "EXIT_CODE=$?" >> coq_build.log

      - uses: actions/upload-artifact@v4
        with:
          name: coq-build-log
          path: 投稿论文/coq_build.log
